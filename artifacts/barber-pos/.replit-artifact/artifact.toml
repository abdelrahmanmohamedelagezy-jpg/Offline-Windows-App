kind = "web"
previewPath = "/"
title = "Omar Elsadany Barber POS"
version = "1.0.0"
id = "artifacts/barber-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23744

[services.development]
run = "pnpm --filter @workspace/barber-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/barber-pos", "run", "build" ]
publicDir = "artifacts/barber-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23744"
BASE_PATH = "/"
